<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <!-- Blocking FOUC script (external so CSP script-src 'self' allows it). -->
    <script src="/appearance-boot.js"></script>
    <meta name="description" content="AiSpaceX — a clean, hackable, open-source web UI for the Venice AI API. Chat, images, audio, music, video, embeddings, and visual workflows." />
    <meta property="og:title" content="AiSpaceX" />
    <meta property="og:description" content="A customizable, open-source frontend for the Venice AI API." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.venice.ai blob: data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>AiSpaceX — clean UI for the Venice AI API</title>
    <link rel="icon" type="image/svg+xml" href="/aispace-logo-dark.svg?v=12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
