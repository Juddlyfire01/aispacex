<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <script>
      (function () {
        try {
          var html = document.documentElement
          var theme = 'dark'
          html.dataset.theme = theme
          html.style.colorScheme = 'dark'
          var raw = localStorage.getItem('venice-settings')
          if (raw) {
            var data = JSON.parse(raw)
            var s = data.state || data
            if (s.theme) theme = s.theme
            html.dataset.theme = theme
            html.style.colorScheme = theme === 'light' ? 'light' : 'dark'
            var scale = s.scale != null ? s.scale : (s.zoom != null ? s.zoom : 100)
            html.style.setProperty('--ui-scale', String(scale / 100))
            html.style.removeProperty('zoom')
            var fontScale = { sm: 0.9, md: 1, lg: 1.12 }
            if (s.fontScale && fontScale[s.fontScale]) {
              html.style.setProperty('--font-scale', String(fontScale[s.fontScale]))
            }
            var densitySpace = s.density === 'compact' ? 0.82 : 1
            html.style.setProperty('--density-space', String(densitySpace))
            if (s.reduceMotion) html.dataset.reduceMotion = String(s.reduceMotion)
            if (s.density) html.dataset.density = s.density
          }
          if (theme === 'light') {
            var meta = document.querySelector('meta[name="theme-color"]')
            if (meta) meta.setAttribute('content', '#f4f4f2')
          }
          var favicon = document.querySelector('link[rel="icon"]')
          if (favicon) {
            favicon.href = '/logo-dark.svg?v=10'
            favicon.type = 'image/svg+xml'
          }
        } catch (_) { /* ignore corrupt storage */ }
      })()
    </script>
    <meta name="description" content="AiSpaceX — a clean, hackable, open-source web UI for the Venice AI API. Chat, images, audio, music, video, embeddings, and visual workflows." />
    <meta property="og:title" content="AiSpaceX" />
    <meta property="og:description" content="A customizable, open-source frontend for the Venice AI API." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.venice.ai blob: data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>AiSpaceX — clean UI for the Venice AI API</title>
    <link rel="icon" type="image/svg+xml" href="/logo-dark.svg?v=10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Color+Emoji&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
